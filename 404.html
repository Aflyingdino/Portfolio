    <script>
        (function () {
            var lang = localStorage.getItem('lang');
            if (lang === 'nl') {
                document.querySelectorAll('[data-lang-' + lang + ']').forEach(function (el) {
                    el.innerHTML = el.getAttribute('data-lang-' + lang);
                });
                var t = document.querySelector('title[data-lang-' + lang + ']');
                if (t) document.title = t.getAttribute('data-lang-' + lang);
                document.querySelectorAll('.lang-option').forEach(function (o) { o.classList.remove('active'); });
                var active = document.querySelector('.lang-option[data-lang="' + lang + '"]');
                if (active) active.classList.add('active');
                document.documentElement.lang = lang;
            }
        })();
